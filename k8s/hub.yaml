# -----------------------------------------------------------
# ServiceAccount for JupyterHub to manage user pods/services
# -----------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hub-sa
  namespace: airflow-dev
---
# -----------------------------------------------------------
# Role — pods, services, events, PVCs (KubeSpawner needs all of these)
# -----------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hub-role
  namespace: airflow-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
# -----------------------------------------------------------
# RoleBinding
# -----------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hub-rolebinding
  namespace: airflow-dev
subjects:
  - kind: ServiceAccount
    name: hub-sa
    namespace: airflow-dev
roleRef:
  kind: Role
  name: hub-role
  apiGroup: rbac.authorization.k8s.io
---
# -----------------------------------------------------------
# PVC for JupyterHub SQLite database (persists user state)
# -----------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hub-db-pvc
  namespace: airflow-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# -----------------------------------------------------------
# JupyterHub Deployment
# -----------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hub
  namespace: airflow-dev
  labels:
    app: hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hub
  template:
    metadata:
      labels:
        app: hub
    spec:
      serviceAccountName: hub-sa
      containers:
        - name: hub
          image: airflow-hub:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8081
              name: hub-api
          env:
            - name: K8S_NAMESPACE
              value: airflow-dev
            - name: HUB_CONNECT_URL
              value: "http://hub-svc.airflow-dev.svc.cluster.local:8081"
          volumeMounts:
            - name: hub-db
              mountPath: /srv/jupyterhub/data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: hub-db
          persistentVolumeClaim:
            claimName: hub-db-pvc
---
# -----------------------------------------------------------
# JupyterHub Service — exposed via NodePort 30080
# -----------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: hub-svc
  namespace: airflow-dev
spec:
  type: NodePort
  selector:
    app: hub
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      name: http
    - port: 8081
      targetPort: 8081
      name: hub-api
